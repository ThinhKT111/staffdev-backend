# Nginx Configuration for StaffDev Backend
# Đặt file này tại: /etc/nginx/conf.d/staffdev-backend.conf (Linux/WSL)
# hoặc: C:\nginx-1.28.0\conf\staffdev-backend.conf (Windows)

# Cấu hình upstream cho Backend API
upstream staffdev_backend {
    server 127.0.0.1:3000;
    # Thêm server nếu có nhiều instance
    # server 127.0.0.1:3001;
    # server 127.0.0.1:3002;
}

# Cấu hình HTTP Server
server {
    listen 80;
    server_name staffdev.local; # Thay đổi thành domain thực tế hoặc IP của bạn

    # Gzip Configuration
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Các logs
    access_log /var/log/nginx/staffdev-backend-access.log; # Điều chỉnh đường dẫn phù hợp
    error_log /var/log/nginx/staffdev-backend-error.log;   # Điều chỉnh đường dẫn phù hợp

    # Cache các file tĩnh
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        root /path/to/staffdev-backend/public; # Điều chỉnh đúng đường dẫn
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy cho API
    location /api/ {
        proxy_pass http://staffdev_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        
        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
    }

    # WebSocket cho notifications
    location /socket.io/ {
        proxy_pass http://staffdev_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Documentation
    location /api-docs/ {
        proxy_pass http://staffdev_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Upload limit
    client_max_body_size 50M;
}

